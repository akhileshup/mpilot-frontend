<!DOCTYPE html>
<html>
<head>
    <title>MPilot AI Growth Engine</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f6fa;
        }

        header {
            background: #111;
            color: #fff;
            padding: 15px;
        }

        .container {
            padding: 20px;
        }

        select, input, button {
            padding: 8px;
            margin: 5px 0;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        /* Modal */
        #authModal {
            display: none;
            position: fixed;
            top: 25%;
            left: 40%;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            z-index: 1000;
        }
    </style>
</head>

<body>

<header>
    <h2>🚀 MPilot AI Growth Engine</h2>
</header>

<div class="container">

    <!-- AUTH -->
    <button onclick="openAuthModal()">Login / Signup</button>

    <!-- BUSINESS -->
    <h3>Select Business</h3>
    <select id="businessSelect">
        <option>Loading...</option>
    </select>

    <!-- DASHBOARD -->
    <h3>Dashboard</h3>

    <div class="grid">
        <div class="card">Total Leads: <span id="totalLeads">—</span></div>
        <div class="card">WhatsApp Opt-In: <span id="whatsappOptIn">—</span></div>
        <div class="card">QR Scans: <span id="qrScans">—</span></div>
        <div class="card">Churn Risk: <span id="churnRisk">—</span></div>
        <div class="card">Campaigns Sent: <span id="campaignsSent">—</span></div>
        <div class="card">Google Rating: <span id="googleRating">—</span></div>
        <div class="card">VIP Customers: <span id="vipCustomers">—</span></div>
        <div class="card">Revenue: <span id="revenueTracked">—</span></div>
    </div>

</div>

<!-- AUTH MODAL -->
<div id="authModal">
    <h3>Login / Signup</h3>

    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button onclick="login()">Login</button>
    <button onclick="signup()">Signup</button>
    <button onclick="closeAuthModal()">Close</button>
</div>

<!-- IMPORTANT: JS FILE -->
<script src="app.js"></script>

</body>
</html>
